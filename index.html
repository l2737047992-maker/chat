<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的私密助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; height: 100vh; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; }
        .header { background: #16213e; color: #e94560; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }
        .chat-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.6; font-size: 15px; word-break: break-word; }
        .user-message { align-self: flex-end; background: #0f3460; color: #eaeaea; }
        .ai-message { align-self: flex-start; background: #16213e; color: #eaeaea; }
        .input-area { display: flex; padding: 12px; background: #16213e; gap: 8px; }
        .input-area input { flex: 1; padding: 12px 16px; border-radius: 24px; border: none; background: #1a1a2e; color: #eaeaea; font-size: 15px; outline: none; }
        .input-area button { padding: 12px 20px; border-radius: 24px; border: none; background: #e94560; color: white; font-size: 15px; font-weight: bold; cursor: pointer; }
        .lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        .lock-screen h2 { color: #e94560; margin-bottom: 20px; }
        .lock-screen input { padding: 12px 16px; border-radius: 24px; border: none; background: #16213e; color: #eaeaea; font-size: 15px; outline: none; width: 200px; text-align: center; margin-bottom: 10px; }
        .lock-screen button { padding: 10px 24px; border-radius: 24px; border: none; background: #e94560; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
        .lock-screen .hint { color: #888; font-size: 12px; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
    <h2>🔒 私密入口</h2>
    <input type="password" id="passwordInput" placeholder="输入访问密码" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">进入</button>
    <div class="hint">密码只有你知道</div>
</div>

<div class="header">🤖 我的私密助手</div>
<div class="chat-container" id="chatContainer">
    <div class="message ai-message">你好！我是你的专属助手，我们的对话完全私密。</div>
</div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">发送</button>
</div>

<script>
    // ========== 设置你的访问密码 ==========
    const ACCESS_PASSWORD = '0111';
    // =====================================

    let messages = [{ role: "system", content: "你是一个有帮助的AI助手" }];

    function unlock() {
        const input = document.getElementById('passwordInput').value;
        if (input === ACCESS_PASSWORD) {
            document.getElementById('lockScreen').classList.add('hidden');
            localStorage.setItem('unlocked', 'true');
        } else {
            alert('密码错误');
        }
    }

    window.onload = function() {
        if (localStorage.getItem('unlocked') === 'true') {
            document.getElementById('lockScreen').classList.add('hidden');
        }
    };

    function addMessage(text, sender) {
        const container = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.className = 'message ' + (sender === 'user' ? 'user-message' : 'ai-message');
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const userMessage = input.value.trim();
        if (!userMessage) return;

        addMessage(userMessage, 'user');
        input.value = '';
        messages.push({ role: "user", content: userMessage });

        const loadingDiv = addMessage('思考中...', 'ai');

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages })
            });
            const data = await response.json();
            loadingDiv.innerText = data.reply || '抱歉，出了点问题。';
            messages.push({ role: "assistant", content: data.reply });
        } catch (error) {
            loadingDiv.innerText = '网络错误，请稍后重试。';
        }
    }
</script>
</body>
</html>
